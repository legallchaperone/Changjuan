services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: changjuan
      POSTGRES_PASSWORD: changjuan
      POSTGRES_DB: changjuan
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: changjuan
      MINIO_ROOT_PASSWORD: changjuan-local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
